<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <title>TheSteamerZone Connector</title>
    <link rel="icon" type="image/png" href="assets/icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <img class="app-logo" src="assets/icon.png" width="64" height="64" alt="" />
      <h1>TheSteamerZone</h1>
      <p class="subtitle">โปรแกรมสำหรับไลฟ์สตรีม</p>
    </header>

    <section id="linkBanner" class="card link-banner">
      <div class="link-row">
        <span id="pillWeb" class="pill pill-off">เว็บ</span>
        <span class="link-arrow" aria-hidden="true">⟷</span>
        <span id="pillProgram" class="pill pill-on">โปรแกรม</span>
      </div>
      <p id="linkMessage" class="link-message">กำลังตรวจสอบ…</p>
      <p id="roomCode" class="room-code"></p>
    </section>

    <section class="card status-card">
      <div class="status-row">
        <span id="statusDot" class="dot dot-off"></span>
        <span id="statusText">กำลังตรวจสอบ…</span>
      </div>
      <ul id="checklist" class="checklist"></ul>
    </section>

    <section class="card">
      <h2 class="card-title">เชื่อมห้อง</h2>
      <p class="hint">
        ล็อกอินเว็บ → คัดลอก <strong>รหัสห้อง</strong> และ <strong>รหัสเชื่อม</strong> → กรอกด้านล่าง
      </p>
      <label class="field">
        <span>รหัสห้อง</span>
        <input id="inputRoomCode" type="text" placeholder="เช่น A1B2-C3D4" autocomplete="off" />
      </label>
      <label class="field">
        <span>รหัสเชื่อม</span>
        <input id="inputPairSecret" type="text" placeholder="8 ตัวจากเว็บ" autocomplete="off" />
      </label>
      <button type="button" id="btnPair" class="btn primary" style="margin-top: 12px; width: 100%">
        เชื่อมห้อง
      </button>
      <p id="pairMsg" class="pair-msg" hidden></p>
      <button type="button" id="btnWebSetup" class="btn subtle" style="margin-top: 10px; width: 100%">
        เปิดหน้าเว็บ (คัดลอกรหัส)
      </button>
    </section>

    <section class="card actions">
      <button type="button" id="btnWidgets" class="btn">หน้า Widgets (OBS)</button>
    </section>

    <section class="card">
      <button type="button" id="btnData" class="btn subtle">เปิดโฟลเดอร์ข้อมูลของฉัน</button>
    </section>

    <section class="card log-card">
      <h2>บันทึก</h2>
      <pre id="logBox" class="log"></pre>
    </section>

    <footer class="footer">ปิดหน้าต่าง = ออกจากโปรแกรม</footer>
    <script src="renderer.js"></script>
  </body>
</html>
